<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derekkoz.AI</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --cyan:    #00d4ff;
            --blue:    #3a7bd5;
            --indigo:  #5b6ef5;
            --violet:  #7b5fff;
            --purple:  #a855f7;

            --grad-main:   linear-gradient(135deg, #00d4ff 0%, #3a7bd5 35%, #7b5fff 70%, #a855f7 100%);
            --grad-btn:    linear-gradient(135deg, #00c8f8 0%, #5b6ef5 50%, #a855f7 100%);
            --grad-user:   linear-gradient(135deg, rgba(0,212,255,0.25) 0%, rgba(91,110,245,0.30) 100%);
            --glass:       rgba(255,255,255,0.12);
            --glass-heavy: rgba(255,255,255,0.20);
            --glass-border:rgba(255,255,255,0.28);
            --shadow-glow: 0 8px 32px rgba(91,110,245,0.40);
        }

        html { height: 100%; }

        body {
            min-height: 100dvh;
            height: 100dvh;
            background: linear-gradient(160deg, #0a1628 0%, #0d1f3c 30%, #1a1050 60%, #0f0a2e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        
        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 55% 45% at 10% 15%, rgba(0,212,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 90% 85%, rgba(168,85,247,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(91,110,245,0.10) 0%, transparent 70%);
        }

        
        .app-wrapper {
            position: relative; z-index: 1;
            width: 100%; height: 100dvh;
            max-width: 680px;
            display: flex; flex-direction: column;
            background: rgba(10, 15, 40, 0.55);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-left:  1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            overflow: hidden;
        }

        
        header {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between;
            align-items: center; padding: 13px 18px;
            background: rgba(10,15,45,0.70);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        
        header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: var(--grad-main);
            background-size: 200% 100%;
            animation: slide-grad 4s linear infinite;
        }
        @keyframes slide-grad {
            0%   { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .header-left { flex: 1; }
        .header-right { flex: 1; display: flex; justify-content: flex-end; }
        .header-center {
            flex: 2; display: flex; align-items: center;
            justify-content: center; gap: 10px;
        }

        .project-logo {
            width: 34px; height: 34px;
            object-fit: contain; border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,212,255,0.35);
        }

        .title {
            font-size: 1.15rem; font-weight: 800;
            background: var(--grad-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.02em;
        }

        .status-dot {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.72rem; color: rgba(255,255,255,0.55); font-weight: 500;
        }
        .status-dot::before {
            content: '';
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            animation: pulse-dot 2.2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; box-shadow:0 0 6px var(--cyan); }
            50%      { opacity:.5; box-shadow:0 0 14px var(--cyan); }
        }

        .btn-clear {
            width: 38px; height: 38px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 22px; color: #fff;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: .22s cubic-bezier(.4,0,.2,1);
        }
        .btn-clear:hover {
            background: rgba(255,255,255,0.20);
            transform: rotate(90deg);
            box-shadow: 0 0 12px rgba(0,212,255,0.3);
        }
        .btn-clear:active { transform: scale(0.9) rotate(90deg); }

        
        #chat-container {
            flex: 1; padding: 20px 16px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
            position: relative; z-index: 5;
        }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--cyan), var(--purple));
            border-radius: 10px;
        }

        
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; text-align: center; padding: 30px;
            animation: fadeIn .5s ease;
        }
        .empty-icon-wrap {
            position: relative; width: 80px; height: 80px;
        }
        .empty-icon-wrap img {
            width: 80px; height: 80px; border-radius: 20px;
            animation: float-icon 3s ease-in-out infinite;
            box-shadow: 0 8px 28px rgba(91,110,245,0.55), 0 0 0 1px rgba(255,255,255,0.1);
        }
        .empty-icon-ring {
            position: absolute; inset: -10px;
            border-radius: 30px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(0,212,255,0.4), rgba(168,85,247,0.4)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: spin-ring 6s linear infinite;
        }
        @keyframes spin-ring { to { transform: rotate(360deg); } }
        @keyframes float-icon {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        .empty-state h2 {
            font-size: 1.25rem; font-weight: 800; color: #fff;
            text-shadow: 0 2px 12px rgba(91,110,245,0.5);
        }
        .empty-state p { font-size: 0.87rem; color: rgba(255,255,255,0.5); max-width: 250px; line-height: 1.65; }

        
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(14px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .message {
            padding: 13px 16px;
            border-radius: 18px;
            line-height: 1.65;
            font-size: 0.94rem;
            animation: fadeIn .3s ease;
        }

       
        .message.user {
            align-self: flex-end;
            max-width: 82%;
            background: rgba(255,255,255,0.95);
            color: #1a1a2e;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(0,212,255,0.20), 0 1px 0 rgba(255,255,255,0.8) inset;
            border: 1px solid rgba(255,255,255,0.9);
            font-weight: 500;
        }

        
        .message.ai {
            align-self: flex-start;
            max-width: 100%; width: 100%;
            background: rgba(15, 20, 55, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255,255,255,0.92);
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(91,110,245,0.30);
            box-shadow: var(--shadow-glow);
        }

        .message.ai h1,.message.ai h2,.message.ai h3 {
            margin: 14px 0 6px;
            background: var(--grad-main);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-size: 1.05rem;
        }
        .message.ai h1:first-child,.message.ai h2:first-child,.message.ai h3:first-child { margin-top:0; }
        .message.ai p { margin-bottom: 10px; color: rgba(255,255,255,0.88); }
        .message.ai ul,.message.ai ol { margin-left:20px; margin-bottom:10px; color: rgba(255,255,255,0.85); }
        .message.ai code {
            background: rgba(0,212,255,0.12); border-radius:5px;
            padding: 1px 7px; font-size:.87em; color: var(--cyan);
            border: 1px solid rgba(0,212,255,0.20);
        }
        .message.ai pre {
            background: rgba(0,0,0,0.40); border-radius:10px;
            padding:14px; overflow-x:auto; margin-bottom:10px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .message.ai pre code { background:transparent; color:#e2e8f0; padding:0; border:none; }

        
        .sources-container {
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid rgba(91,110,245,0.25);
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .source-card {
            display: flex; align-items: center; gap: 7px;
            padding: 5px 12px;
            background: rgba(91,110,245,0.15);
            border-radius: 20px; text-decoration: none;
            color: rgba(255,255,255,0.80);
            font-size: .78rem;
            border: 1px solid rgba(91,110,245,0.30);
            transition: .2s ease;
        }
        .source-card:hover {
            background: rgba(91,110,245,0.30);
            border-color: var(--cyan);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0,212,255,0.20);
            color: #fff;
        }
        .source-card img { width:15px; height:15px; border-radius:50%; }

        
        .reasoning-wrap {
            display: flex; flex-direction: column; gap: 10px;
            padding: 4px 0;
        }

        
        .reasoning-header {
            display: flex; align-items: center; gap: 10px;
        }
        .reasoning-orb {
            position: relative; width: 36px; height: 36px; flex-shrink: 0;
        }
        
        .reasoning-orb::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                var(--cyan)    0%,
                var(--indigo)  25%,
                var(--violet)  50%,
                var(--purple)  75%,
                var(--cyan)   100%
            );
            animation: spin-orb 1.6s linear infinite;
        }
        @keyframes spin-orb { to { transform: rotate(360deg); } }
        
        .reasoning-orb::after {
            content: '🔍';
            position: absolute; inset: 4px;
            background: #0d1230;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; line-height: 28px; text-align: center;
        }

        .reasoning-label {
            font-size: .82rem; font-weight: 600;
            color: rgba(255,255,255,0.75);
            letter-spacing: .04em; text-transform: uppercase;
        }
        
        .reasoning-dots span {
            display: inline-block;
            animation: dot-bounce .9s ease-in-out infinite;
            color: var(--cyan); font-weight: 700;
        }
        .reasoning-dots span:nth-child(2) { animation-delay: .18s; }
        .reasoning-dots span:nth-child(3) { animation-delay: .36s; }
        @keyframes dot-bounce {
            0%,80%,100% { transform: translateY(0); opacity:.4; }
            40%          { transform: translateY(-4px); opacity:1; }
        }

        
        .reasoning-tokens {
            height: 24px; overflow: hidden; position: relative;
        }
        .token-stream {
            display: flex; flex-direction: column; gap: 4px;
            animation: scroll-tokens 2.4s linear infinite;
        }
        @keyframes scroll-tokens {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .token-row {
            display: flex; gap: 6px; align-items: center;
            height: 24px; flex-shrink: 0;
        }
        .token {
            height: 10px; border-radius: 5px;
            background: linear-gradient(90deg,
                rgba(0,212,255,0.35) 0%,
                rgba(91,110,245,0.35) 50%,
                rgba(168,85,247,0.35) 100%);
            animation: token-glow 1.8s ease-in-out infinite alternate;
        }
        @keyframes token-glow {
            from { opacity: .35; }
            to   { opacity: .85; }
        }


        .reasoning-bar {
            height: 3px; border-radius: 3px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .reasoning-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--indigo), var(--purple));
            background-size: 200% 100%;
            animation: bar-sweep 1.8s ease-in-out infinite;
            border-radius: 3px;
        }
        @keyframes bar-sweep {
            0%   { width: 10%; background-position: 0% 0%; }
            50%  { width: 75%; background-position: 100% 0%; }
            100% { width: 10%; background-position: 0% 0%; }
        }

        /* ── Input Area ── */
        .input-area {
            position: relative; z-index: 10;
            padding: 12px 14px 18px;
            background: rgba(10,15,45,0.70);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; gap: 10px; align-items: center;
        }

        input[type="text"] {
            flex: 1; padding: 13px 20px;
            border-radius: 30px;
            border: 1.5px solid rgba(91,110,245,0.40);
            background: rgba(255,255,255,0.07);
            font-size: .96rem; outline: none;
            color: #fff; caret-color: var(--cyan);
            transition: .22s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 2px 12px rgba(91,110,245,0.12);
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }
        input[type="text"]:focus {
            border-color: var(--cyan);
            background: rgba(255,255,255,0.11);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.18), 0 2px 14px rgba(0,212,255,0.12);
        }

        .btn-send {
            flex-shrink: 0; width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--grad-btn);
            border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 18px rgba(91,110,245,0.55);
            transition: .22s cubic-bezier(.4,0,.2,1);
            position: relative; overflow: hidden;
        }
        .btn-send::after {
            content:''; position:absolute; inset:0; border-radius:50%;
            background:rgba(255,255,255,0);
            transition:.22s;
        }
        .btn-send:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(0,212,255,0.55);
        }
        .btn-send:hover::after { background:rgba(255,255,255,0.14); }
        .btn-send:active { transform: scale(0.92); }
        .btn-send svg { width:22px; height:22px; fill:#fff; position:relative; z-index:1; }

        /* ── Desktop ── */
        @media (min-width: 768px) {
            .app-wrapper {
                height: 92vh;
                border-radius: 26px;
                border: 1px solid var(--glass-border);
                box-shadow:
                    0 0 0 1px rgba(0,212,255,0.08),
                    0 24px 64px rgba(91,110,245,0.45),
                    0 4px 16px rgba(0,0,0,0.4);
                overflow: hidden;
            }
        }

        @media (max-width: 380px) {
            .title { font-size: 1rem; }
            input[type="text"] { padding: 11px 16px; font-size: .92rem; }
            .btn-send { width:42px; height:42px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <header>
        <div class="header-left">
            <span class="status-dot">Online</span>
        </div>
        <div class="header-center">
            <img src="logo.png" alt="Logo" class="project-logo" onerror="this.style.display='none'">
            <div class="title">Derekkoz.AI</div>
        </div>
        <div class="header-right">
            <button class="btn-clear" id="clearBtn" title="Жаңа сұхбат">+</button>
        </div>
    </header>

    <div id="chat-container">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon-wrap">
                <img src="logo.png" alt="Logo" onerror="this.src=''">
                <div class="empty-icon-ring"></div>
            </div>
            <h2>Derekkoz.AI</h2>
            <p>Сұрақ қойыңыз — жауап іздеп береміз!</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="queryInput" placeholder="Сұранысты енгізіңіз..." autocomplete="off">
        <button class="btn-send" id="sendBtn" aria-label="Жіберу">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const queryInput    = document.getElementById('queryInput');
    const sendBtn       = document.getElementById('sendBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const emptyState    = document.getElementById('emptyState');

    
    function buildReasoningHTML() {
        
        function tokenRows() {
            const widths = [
                [60,90,45,70],[80,50,100,40],[55,75,95,35],
                [70,60,80,50],[45,100,55,65]
            ];
            return widths.map(row =>
                `<div class="token-row">${
                    row.map(w =>
                        `<div class="token" style="width:${w}px;animation-delay:${(Math.random()*.8).toFixed(2)}s"></div>`
                    ).join('')
                }</div>`
            ).join('');
        }
        const rows = tokenRows();
        return `
        <div class="reasoning-wrap">
            <div class="reasoning-header">
                <div class="reasoning-orb"></div>
                <div>
                    <div class="reasoning-label">
                        Ойлауда
                        <span class="reasoning-dots">
                            <span>.</span><span>.</span><span>.</span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="reasoning-tokens">
                <div class="token-stream">${rows}${rows}</div>
            </div>
            <div class="reasoning-bar">
                <div class="reasoning-bar-fill"></div>
            </div>
        </div>`;
    }

    
    let isScrolledToBottom = true;
    chatContainer.addEventListener('scroll', () => {
        isScrolledToBottom =
            chatContainer.scrollHeight - chatContainer.clientHeight <=
            chatContainer.scrollTop + 60;
    });
    function scrollToBottom() {
        if (isScrolledToBottom) chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    
    clearBtn.addEventListener('click', () => {
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        emptyState.style.display = 'flex';
    });

    
    queryInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendQuery(); });
    sendBtn.addEventListener('click', sendQuery);

    
    async function sendQuery() {
        const query = queryInput.value.trim();
        if (!query) return;

        if (emptyState.parentElement) emptyState.style.display = 'none';

        appendMessage('user', query);
        queryInput.value = '';

        /* AI bubble */
        const aiMessageDiv = document.createElement('div');
        aiMessageDiv.className = 'message ai';

        const contentDiv = document.createElement('div');
        contentDiv.innerHTML = buildReasoningHTML();
        aiMessageDiv.appendChild(contentDiv);

        const sourcesDiv = document.createElement('div');
        sourcesDiv.className = 'sources-container';
        sourcesDiv.style.display = 'none';
        aiMessageDiv.appendChild(sourcesDiv);

        chatContainer.appendChild(aiMessageDiv);
        isScrolledToBottom = true;
        scrollToBottom();

        let fullText = '';

        try {
            const response = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            const reader  = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            contentDiv.innerHTML = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n\n');

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const dataStr = line.replace('data: ', '');
                    if (!dataStr) continue;

                    const payload = JSON.parse(dataStr);

                    if (payload.type === 'sources') {
                        renderSources(payload.data, sourcesDiv);
                        scrollToBottom();
                    } else if (payload.type === 'text') {
                        fullText += payload.data;
                        contentDiv.innerHTML = marked.parse(fullText);
                        scrollToBottom();
                    }
                }
            }
        } catch (error) {
            contentDiv.innerHTML =
                `<span style="color:#f87171;font-weight:500;">⚠️ Сервер қателігі. Қайталап көріңіз.</span>`;
        }
    }

   
    function renderSources(sources, container) {
        container.style.display = 'flex';
        container.innerHTML = '';
        sources.forEach(src => {
            const a = document.createElement('a');
            a.href = src.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
            a.className = 'source-card';
            a.innerHTML = `
                <img src="${src.favicon}" alt=""
                     onerror="this.src='https://www.google.com/favicon.ico'">
                <span>${src.domain}</span>`;
            container.appendChild(a);
        });
    }

    
    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.textContent = text;
        chatContainer.appendChild(div);
        isScrolledToBottom = true;
        scrollToBottom();
    }
</script>
</body>
</html>
